[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mimic-concordia"
version = "0.2.0-alpha.0"
description = "Mimic 2.0 wrapper around DeepMind Concordia v2.0.1 — the import-stability layer for the Concordia fork (Plan §9.1, ADR 2026-05-22)."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "BSL-1.1"}
keywords = ["concordia", "generative-agents", "social-simulation", "mimic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "gdm-concordia==2.0.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.mimic]
upstream-pypi = "gdm-concordia"
upstream-version = "2.0.1"
upstream-license = "Apache-2.0"
upstream-home = "https://github.com/google-deepmind/concordia"

[tool.setuptools.packages.find]
where = ["."]
include = ["mimic_concordia*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
