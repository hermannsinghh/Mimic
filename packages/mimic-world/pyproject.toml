[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mimic-world"
version = "0.1.0"
description = "Multi-company scenario engine for supply chain cascade simulation"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["supply-chain", "simulation", "economics", "agents", "llm", "scenario"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "anthropic>=0.40.0",
    "networkx>=3.0",
    "matplotlib>=3.7",
    "rich>=13.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]
notebooks = [
    "jupyter>=1.0",
    "ipykernel>=6.0",
    "plotly>=5.0",
]

[project.urls]
Homepage = "https://github.com/trymimic/mimic-world"
Repository = "https://github.com/trymimic/mimic-world"
Documentation = "https://docs.trymimic.ai/world"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.setuptools.packages.find]
where = ["."]
include = ["mimic_world*"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
