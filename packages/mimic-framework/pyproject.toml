[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mimic-framework"
version = "0.2.0-alpha.0"
description = "Audit-grade stress-testing SDK for financial institutions (Mimic 2.0)"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "BSL-1.1"}
keywords = ["llm", "finance", "agents", "simulation", "sec", "economics", "reinsurance", "stress-test"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "tenacity>=8.0",
    "openai>=1.0",
    "rich>=13.0",
    "yfinance>=0.2",
    "click>=8.0",
    "pyyaml>=6.0",
]

[tool.mimic]
fibo-version = "2025-Q3"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]
dotenv = [
    "python-dotenv>=1.0",
]

[project.scripts]
mimic = "mimic.cli:cli"

[tool.setuptools.packages.find]
where = ["."]
include = ["mimic*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
