[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mimic-forecast"
version = "0.1.0"
description = "Foundation model adapter layer for quantitative forecasting in the Mimic ecosystem"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Mimic", email = "hello@trymimic.ai" }]
keywords = ["forecasting", "time-series", "foundation-models", "finance", "AI"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "pandas>=2.0",
    "numpy>=1.24",
    "pydantic>=2.0",
    "requests>=2.31",
    "tqdm>=4.65",
]

[project.optional-dependencies]
timesfm = [
    "timesfm>=1.2.7",
    "torch>=2.1",
    "huggingface_hub>=0.23",
]
chronos = [
    "chronos-forecasting>=1.5",
    "torch>=2.1",
    "huggingface_hub>=0.23",
]
finbert = [
    "transformers>=4.40",
    "torch>=2.1",
]
kronos = [
    "transformers>=4.40",
    "torch>=2.1",
    "huggingface_hub>=0.23",
]
moirai = [
    "uni2ts>=1.1",
    "torch>=2.1",
    "huggingface_hub>=0.23",
]
data = [
    "yfinance>=0.2.40",
    "fredapi>=0.5.1",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "fredapi>=0.5",
]
all = [
    "mimic-forecast[timesfm,chronos,finbert,kronos,moirai,data]",
]

[project.urls]
Homepage = "https://github.com/trymimic/mimic-forecast"
Repository = "https://github.com/trymimic/mimic-forecast"
Issues = "https://github.com/trymimic/mimic-forecast/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["mimic_forecast*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.10"
strict = false
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
