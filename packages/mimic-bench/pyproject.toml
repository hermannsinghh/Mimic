[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mimic-bench"
version = "0.1.0"
description = "Benchmark suite for evaluating LLM-based corporate decision simulation"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Mimic", email = "bench@trymimic.ai" }]
requires-python = ">=3.10"
keywords = ["benchmark", "LLM", "corporate simulation", "fidelity", "economics"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = []  # zero hard deps for core benchmark runner

[project.optional-dependencies]
semantic = ["sentence-transformers>=2.7"]
extraction = ["anthropic>=0.34", "requests>=2.31", "beautifulsoup4>=4.12"]
dev = [
    "pytest>=8",
    "pytest-cov",
    "ruff>=0.4",
    "mypy>=1.10",
    "sentence-transformers>=2.7",
    "anthropic>=0.34",
]
all = ["mimic-bench[semantic,extraction,dev]"]

[project.urls]
Homepage = "https://github.com/trymimic/mimic-bench"
Repository = "https://github.com/trymimic/mimic-bench"
Issues = "https://github.com/trymimic/mimic-bench/issues"

[tool.setuptools.packages.find]
include = ["mimic_bench*"]

[tool.setuptools.package-data]
"mimic_bench" = ["py.typed"]
"data" = ["events/*.json", "ground_truth/*.jsonl", "companies.json"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
