name: determinism

on:
  pull_request:
  push:
    branches: [main]

jobs:
  golden-vectors:
    name: world_state_hash + SeedManifest golden vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install mimic-framework
        working-directory: packages/mimic-framework
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
      - name: Run determinism suite
        working-directory: packages/mimic-framework
        run: pytest tests/determinism/ -q --tb=short

  contagion-goldens:
    name: Eisenberg-Noe golden tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install mimic-world
        working-directory: packages/mimic-world
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
      - run: pytest packages/mimic-world/tests/contagion/ -q --tb=short

  reproducibility:
    name: Same seed → same world_state_hash across two runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install mimic-framework
        working-directory: packages/mimic-framework
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Cross-run hash equality
        run: |
          python - <<'PY'
          from mimic.framework.determinism import world_state_hash, SeedManifest
          inp = dict(
              entity_graph_state={"svb": {"assets": 209.0}},
              agent_memory_state={"did:web:svb": {"last": "hold"}},
              market_state={"spx": 4000.0},
              time_step="2023-03-08T15:00:00Z",
          )
          h1 = world_state_hash(**inp)
          h2 = world_state_hash(**inp)
          assert h1 == h2, f"hash drift across runs: {h1} vs {h2}"
          m = SeedManifest(global_seed=42)
          assert m.per_shard_seed(0) == m.per_shard_seed(0)
          print(f"OK — world_state_hash={h1[:16]}...")
          PY
