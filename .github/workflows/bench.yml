name: bench

on:
  pull_request:
  schedule:
    - cron: "0 6 * * *"  # nightly

jobs:
  eval-metrics:
    name: scoring metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest numpy
      - run: pytest eval/harness/tests/ -q --tb=short

  forecast-bench:
    name: mimic-forecast adapters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install mimic-forecast
        working-directory: packages/mimic-forecast
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
      - run: pytest packages/mimic-forecast/tests/ -q --tb=short
